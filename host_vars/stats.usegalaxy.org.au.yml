#Hostname
hostname: "{{ inventory_hostname }}.usegalaxy.org.au"

# Volume
attached_volumes:
  - device: /dev/vdb
    partition: 1
    path: /mnt
    fstype: xfs
    label: msdos

# Certbot
certbot_auto_renew_hour: "{{ 23 |random(seed=inventory_hostname)  }}"
certbot_auto_renew_minute: "{{ 59 |random(seed=inventory_hostname)  }}"
certbot_auth_method: --webroot
certbot_install_method: virtualenv
certbot_virtualenv_package_name: python3-virtualenv
certbot_auto_renew: yes
certbot_auto_renew_user: root
certbot_environment: production
certbot_well_known_root: /srv/nginx/_well-known_root
certbot_share_key_users:
  - nginx
  - influxdb
certbot_post_renewal: |
    systemctl restart nginx || true
    systemctl restart influxdb || true
certbot_domains:
 - "{{ hostname }}"
certbot_agree_tos: --agree-tos

# NGINX
nginx_enable_default_server: false
nginx_servers:
  #- influxdb
  - redirect-ssl
nginx_ssl_servers:
  #- influxdb-ssl
  - grafana-ssl
nginx_conf_http:
  client_max_body_size: 1g

# Nginx Letsencrypt bindings
nginx_ssl_role: usegalaxy_eu.certbot
nginx_conf_ssl_certificate: /etc/ssl/certs/fullchain.pem
nginx_conf_ssl_certificate_key: /etc/ssl/user/privkey-nginx.pem

####### InfluxDB

# General Influx
influxdb_ver: 1.8.10 # stays the same as stats.usegalaxy.org.au - last available release of v1.x

# Influxdb container definition
influxdb_container:
  name: influxdb_server
  image: "influxdb:{{ influxdb_ver }}"
  hostname: "{{ hostname }}"

influxdb_https_enabled: "true"
influxdb_container_pause: 20

influxdb_base_data_dir: /mnt/influx_data
influxdb_http_auth_enabled: "true"
influxdb_http_https_enabled: "true"
influxdb_http_https_certificate: "/etc/ssl/certs/fullchain.pem"
influxdb_http_https_private_key: "/etc/ssl/user/privkey-influxdb.pem"
influxdb_http_log_enabled: "false"

# InfluxDB data
influxdb_index_version: "tsi1"
influxdb_data_cache_max_memory_size: 1048576000
influxdb_data_cache_snapshot_write_cold_duration: "10s"
influxdb_data_max_values_per_tag: 3000000

# used by influxdb-container role
influxdb_data_dir: "{{ influxdb_base_data_dir }}"

# InfluxDB logging
influxdb_logging_level: "error"

# [[graphite]]
# not used by containerised influxdb - ignored
influxdb_graphite_enabled: "false"
influxdb_collectd_enabled: "false"
influxdb_tsb_enabled: "false"
influxdb_udp_enabled: "false"

#Influx Users
# these are referred to outside of the influxdb-container role - need to keep
influxdb:
  admin:
    username: admin
    password: "{{ vault_influx_admin_password }}"
  node:
    username: node
    password: "{{ vault_influx_node_password }}"
  grafana:
    username: grafana
    password: "{{ vault_influx_grafana_password }}"
  url: "https://{{ hostname }}:8086"

# users mapped to influxdb-container variable
influxdb_users:
  admin:
    - username: "{{ influxdb.admin.username }}"
      password: "{{ influxdb.admin.password }}"
  regular:
    - username: "{{ influxdb.grafana.username }}"
      password: "{{ influxdb.grafana.password }}"
      perms: "READ"
    - username: "{{ influxdb.node.username }}"
      password: "{{ influxdb.node.password }}"
      perms: "ALL"

#Influx DB objects
influxdb_databases:
  # Clusters
  - 'pulsar-mel2'
  - 'pulsar-mel3'
  - 'pulsar-nci-training'
  - 'galaxy_etca'
  - 'pulsar-QLD'
  # Others
  - 'pulsar-special'
  - 'ancillary'
  - 'GA_server'
  - 'queues'
  - 'staging'
  - 'dev'
  - 'mdu-phl'
  - 'mdu-research'
  - 'workflow_invocations'

retention_policy_dbs:
  # Clusters
  - 'pulsar-mel2'
  - 'pulsar-mel3'
  - 'pulsar-nci-training'
  - 'pulsar-QLD'
  # Others
  - 'pulsar-special'
  - 'ancillary'
  - 'queues'
  - 'staging'
  - 'dev'
  - 'mdu-phl'
  - 'mdu-research'

influxdb_retention_policy:
  policy_name: twoweeks
  duration: 14d
  replication: 1
  default: "DEFAULT"
  databases: "{{ retention_policy_dbs }}"

influxdb_custom_retention_policy:
  policy_name: two_months
  duration: 8w
  replication: 1
  default: "DEFAULT"
  databases:
    - galaxy_etca

# influxdb container volumes, ports and environment
# We override the whole env dict so we can fix the SYZE typo
influxdb_container_standalone_setup_details:
  volumes:
    - "{{ influxdb_data_dir }}:/var/lib/influxdb"
    - "{{ influxdb_http_https_certificate }}:{{ influxdb_http_https_certificate }}:ro"
    - "{{ influxdb_http_https_private_key }}:{{ influxdb_http_https_private_key }}:ro"
  ports:
    - "8086:8086"
  env:
    INFLUXDB_HTTP_AUTH_ENABLED: "{{ influxdb_http_auth_enabled }}"
    INFLUXDB_HTTP_ENABLED: "true"
    INFLUXDB_HTTP_HTTPS_ENABLED: "{{ influxdb_http_https_enabled }}"
    INFLUXDB_HTTP_HTTPS_CERTIFICATE: "{{ influxdb_http_https_certificate }}"
    INFLUXDB_HTTP_HTTPS_PRIVATE_KEY: "{{ influxdb_http_https_private_key }}"
    INFLUXDB_HTTP_LOG_ENABLED: "{{ influxdb_http_log_enabled }}"
    INFLUXDB_DATA_INDEX_VERSION: "{{ influxdb_index_version }}"
    INFLUXDB_DATA_CACHE_MAX_MEMORY_SIZE: "{{ influxdb_data_cache_max_memory_size | string }}"
    INFLUXDB_DATA_CACHE_SNAPSHOT_WRITE_COLD_DURATION: "{{ influxdb_data_cache_snapshot_write_cold_duration }}"
    INFLUXDB_DATA_MAX_VALUES_PER_TAG: "{{ influxdb_data_max_values_per_tag | string }}"
    INFLUXDB_LOGGING_LEVEL: "{{ influxdb_logging_level }}"
  ulimits:
   - "nofile:96000:96000"


###### Grafana

grafana_version: "12.3.2"

# Grafana General
grafana_data_dir: /mnt/grafana_data
grafana_instance: "{{ hostname }}"
grafana_address: "127.0.0.1"
grafana_url: "https://{{ hostname }}"
grafana_domain: "{{ hostname }}"
#grafana_server: {} # deprecated


grafana_users:
  default_theme: "dark"

grafana_security:
  admin_user: admin
  admin_password: "{{ vault_grafana_admin_password }}"
  allow_embedding: "true"
  cookie_secure: "true"

grafana_auth:
  anonymous:
    enabled: "true"
    org_name: "usegalaxy.org.au"
    org_role: "Viewer"

grafana_image_storage: 
  provider: local

grafana_environment:
  GF_PANELS_DISABLE_SANITIZE_HTML: "true"

grafana_datasources:
  - name: "pulsar-mel2"
    type: influxdb
    url: "{{ influxdb.url }}"
    version: 2
    editable: false
    database: "pulsar-mel2"
    user: "{{ influxdb.grafana.username }}"
