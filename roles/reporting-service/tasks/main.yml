---
- name: Load workflows reporting defaults
  include_vars:
    file: "{{ role_path }}/defaults/workflows.yml"

- name: Create reporting dir
  file:
    path: "{{ reporting_dir }}"
    state: directory
    owner: "{{ reporting_user }}"
    mode: "0755"

- name: Create logs dir
  ansible.builtin.file:
    path: "{{ logs_dir }}"
    state: directory
    owner: "{{ reporting_user }}"
    mode: "0755"

- name: Install logrotate config for reporting-service logs
  ansible.builtin.template:
    src: logrotate.j2
    dest: /etc/logrotate.d/reporting-service
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Copy requirements file
  copy:
    src: requirements.txt
    dest: "{{ reporting_dir }}/requirements.txt"
    mode: "0644"

- name: Create virtualenv
  pip:
    virtualenv: "{{ virtualenv_dir }}"
    requirements: "{{ reporting_dir }}/requirements.txt"

- name: Template reporting-service .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ reporting_dir }}/.env"
    mode: "0600"
    owner: ubuntu

- name: Template S3 retention policy
  ansible.builtin.template:
    src: retention-policy.json.j2
    dest: "{{ reporting_dir }}/retention-policy.json"
    mode: "0644"
    owner: ubuntu

- name: Copy reporting-service Python modules
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ reporting_dir }}/{{ item }}"
    mode: "0644"
    owner: ubuntu
  loop:
    - s3.py
    - s3_cleanup.py

- name: Add cron job to run S3 log cleanup daily
  ansible.builtin.cron:
    name: "S3 log data retention cleanup"
    user: "{{ reporting_user }}"
    minute: "0"
    hour: "2"
    job: >-
      {{ virtualenv_dir }}/bin/python
      {{ reporting_dir }}/s3_cleanup.py
      --policy '{{ reporting_dir }}/retention-policy.json'
      >> {{ logs_dir }}/s3_cleanup.log 2>&1

- name: Include workflows reporting tasks
  include_tasks: workflows.yml
